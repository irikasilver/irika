<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IRIKA Fine Silver — Coming Soon</title>

  <!-- Luxury Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      overflow:hidden;
      font-family:'Montserrat',sans-serif;

      /* YOUR IMAGE AS BACKGROUND */
      background:
      linear-gradient(
        rgba(0,0,0,0.18),
        rgba(0,0,0,0.28)
      ),
      url("./bg.jpeg");

      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;

      display:flex;
      justify-content:center;
      align-items:center;

      animation:bgZoom 18s ease-in-out infinite alternate;
      color:white;
      position:relative;
    }

    /* Slow Luxury Zoom */
    @keyframes bgZoom{
      from{
        background-size:100%;
      }
      to{
        background-size:108%;
      }
    }

    /* Soft Luxury Overlay */
    body::before{
      content:"";
      position:absolute;
      inset:0;

      background:
      radial-gradient(
        circle at top right,
        rgba(255,255,255,0.12),
        transparent 40%
      );

      pointer-events:none;
    }

    /* Floating Glow */
    .glow{
      position:absolute;
      width:500px;
      height:500px;
      border-radius:50%;
      background:radial-gradient(
        circle,
        rgba(255,255,255,0.15),
        transparent 70%
      );

      top:-120px;
      right:-120px;

      filter:blur(20px);

      animation:floatGlow 8s ease-in-out infinite;
    }

    @keyframes floatGlow{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(30px);
      }
      100%{
        transform:translateY(0px);
      }
    }

    /* Main Box */
    .content{
      position:relative;
      z-index:2;

      text-align:center;

      padding:50px 60px;

      background:rgba(255,255,255,0.08);

      backdrop-filter:blur(10px);

      border:1px solid rgba(255,255,255,0.18);

      border-radius:28px;

      box-shadow:
      0 10px 40px rgba(0,0,0,0.15);

      animation:fadeUp 1.4s ease;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(40px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .small{
      font-size:12px;
      letter-spacing:6px;
      text-transform:uppercase;
      color:rgba(255,255,255,0.75);

      margin-bottom:18px;
    }

    h1{
      font-family:'Cormorant Garamond',serif;

      font-size:82px;
      font-weight:400;

      letter-spacing:3px;

      margin-bottom:20px;

      text-shadow:0 5px 20px rgba(0,0,0,0.25);
    }

    .tagline{
      font-size:14px;
      letter-spacing:3px;
      line-height:1.9;

      color:rgba(255,255,255,0.85);

      margin-bottom:35px;
    }

    .btn{
      display:inline-block;

      padding:16px 38px;

      border:1px solid rgba(255,255,255,0.4);

      border-radius:50px;

      text-transform:uppercase;

      letter-spacing:4px;

      font-size:12px;

      cursor:pointer;

      transition:0.4s ease;

      background:rgba(255,255,255,0.08);
    }

    .btn:hover{
      background:rgba(255,255,255,0.18);

      transform:translateY(-3px);

      box-shadow:0 10px 30px rgba(0,0,0,0.18);
    }

    /* Sparkles */
    .sparkle{
      position:absolute;

      width:7px;
      height:7px;

      background:rgba(255,255,255,0.8);

      border-radius:50%;

      animation:sparkle 5s linear infinite;
    }

    .sparkle:nth-child(1){
      top:18%;
      left:15%;
    }

    .sparkle:nth-child(2){
      top:72%;
      left:82%;
      animation-delay:2s;
    }

    .sparkle:nth-child(3){
      top:35%;
      left:90%;
      animation-delay:4s;
    }

    @keyframes sparkle{
      0%{
        opacity:0;
        transform:scale(0.5);
      }
      50%{
        opacity:1;
        transform:scale(1.5);
      }
      100%{
        opacity:0;
        transform:scale(0.5);
      }
    }

    /* Footer */
    .footer{
      position:absolute;

      bottom:30px;

      width:100%;

      text-align:center;

      z-index:2;

      font-size:11px;

      letter-spacing:4px;

      text-transform:uppercase;

      color:rgba(255,255,255,0.7);
    }

    /* Mobile */
    @media(max-width:768px){

      .content{
        width:90%;
        padding:40px 25px;
      }

      h1{
        font-size:52px;
      }

      .tagline{
        font-size:12px;
        letter-spacing:2px;
      }

      .btn{
        padding:14px 28px;
        font-size:11px;
      }
    }

  </style>
</head>

<body>

  <!-- Glow -->
  <div class="glow"></div>

  <!-- Sparkles -->
  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>

  <!-- Content -->
  <div class="content">

    <div class="small">
      Fine Silver Jewelry
    </div>

    <h1>Coming Soon</h1>

    <div class="tagline">
      Crafted with elegance.<br>
      Designed for the world.
    </div>


  </div>

  <!-- Footer -->
  <div class="footer">
    International Luxury Silver Export House
  </div>

</body>
</html>
