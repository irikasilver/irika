<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IRIKA Fine Silver — Coming Soon</title>

  <!-- Luxury Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      min-height:100svh;

      overflow:hidden;

      font-family:'Montserrat',sans-serif;

      background:
      linear-gradient(
        rgba(0,0,0,0.16),
        rgba(0,0,0,0.24)
      ),
      url("./bg.jpeg");

      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;

      display:flex;
      justify-content:center;
      align-items:center;

      animation:bgZoom 18s ease-in-out infinite alternate;

      color:white;

      position:relative;
    }

    /* Slow Luxury Zoom */
    @keyframes bgZoom{

      from{
        background-size:100%;
      }

      to{
        background-size:108%;
      }
    }

    /* Soft Luxury Overlay */
    body::before{

      content:"";

      position:absolute;

      inset:0;

      background:
      radial-gradient(
        circle at top right,
        rgba(255,255,255,0.10),
        transparent 40%
      );

      pointer-events:none;
    }

    /* Floating Glow */
    .glow{

      position:absolute;

      width:500px;
      height:500px;

      border-radius:50%;

      background:
      radial-gradient(
        circle,
        rgba(255,255,255,0.15),
        transparent 70%
      );

      top:-120px;
      right:-120px;

      filter:blur(20px);

      animation:floatGlow 8s ease-in-out infinite;
    }

    @keyframes floatGlow{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(30px);
      }

      100%{
        transform:translateY(0px);
      }
    }

    /* Main Glass Card */
    .content{

      position:relative;

      z-index:2;

      text-align:center;

      padding:58px 70px;

      width:min(90%, 700px);

      background:rgba(255,255,255,0.10);

      backdrop-filter:blur(18px);

      border:1px solid rgba(255,255,255,0.20);

      border-radius:36px;

      box-shadow:
      0 10px 50px rgba(0,0,0,0.14);

      animation:fadeUp 1.4s ease;
    }

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(40px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .small{

      font-size:12px;

      letter-spacing:8px;

      text-transform:uppercase;

      color:rgba(255,255,255,0.72);

      margin-bottom:24px;
    }

    h1{

      font-family:'Cormorant Garamond',serif;

      font-size:96px;

      font-weight:400;

      line-height:0.95;

      letter-spacing:2px;

      margin-bottom:34px;

      text-shadow:
      0 5px 20px rgba(0,0,0,0.18);
    }

    .tagline{

      font-size:15px;

      letter-spacing:4px;

      line-height:2;

      color:rgba(255,255,255,0.88);
    }

    /* Sparkles */
    .sparkle{

      position:absolute;

      width:7px;
      height:7px;

      background:rgba(255,255,255,0.8);

      border-radius:50%;

      animation:sparkle 5s linear infinite;
    }

    .sparkle:nth-child(1){

      top:18%;
      left:15%;
    }

    .sparkle:nth-child(2){

      top:72%;
      left:82%;

      animation-delay:2s;
    }

    .sparkle:nth-child(3){

      top:35%;
      left:90%;

      animation-delay:4s;
    }

    @keyframes sparkle{

      0%{
        opacity:0;
        transform:scale(0.5);
      }

      50%{
        opacity:1;
        transform:scale(1.5);
      }

      100%{
        opacity:0;
        transform:scale(0.5);
      }
    }

    /* Footer */
    .footer{

      position:absolute;

      bottom:28px;

      width:100%;

      text-align:center;

      z-index:2;

      font-size:11px;

      letter-spacing:6px;

      text-transform:uppercase;

      color:rgba(255,255,255,0.68);
    }

    /* ========================= */
    /* MOBILE OPTIMIZATION */
    /* ========================= */

    @media(max-width:768px){

      body{

        padding:20px;

        min-height:100svh;

        background-position:center center;
      }

      .content{

        width:100%;

        max-width:420px;

        padding:42px 24px;

        border-radius:32px;

        backdrop-filter:blur(18px);

        background:rgba(255,255,255,0.10);
      }

      .small{

        font-size:10px;

        letter-spacing:5px;

        margin-bottom:20px;
      }

      h1{

        font-size:68px;

        line-height:0.95;

        margin-bottom:28px;

        letter-spacing:1px;
      }

      .tagline{

        font-size:13px;

        line-height:2;

        letter-spacing:2px;
      }

      .footer{

        bottom:20px;

        font-size:9px;

        letter-spacing:5px;

        line-height:1.8;

        padding:0 20px;
      }

      .glow{

        width:260px;
        height:260px;
      }

      .sparkle{

        transform:scale(0.7);
      }
    }

  </style>
</head>

<body>

  <!-- Glow -->
  <div class="glow"></div>

  <!-- Sparkles -->
  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>

  <!-- Main Content -->
  <div class="content">

    <div class="small">
      Fine Silver Jewelry
    </div>

    <h1>
      Coming<br>
      Soon
    </h1>

    <div class="tagline">
      Crafted with elegance.<br>
      Designed for the world.
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    International Luxury Silver Export House
  </div>

</body>
</html>
